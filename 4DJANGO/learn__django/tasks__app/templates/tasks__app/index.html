{% extends "tasks__app/base.html" %}


{% block main %}
          <a href="{% url 'add' %}">Add A Task</a>
          <h1 class="main__heading">To Do List</h1>
          <ul class="main__tasks">
               {% for task in tasks %}
                    <li class="main__task">{{ task }}</li>
               {% empty %}
                    <li class="main__task">No Tasks</li>
               {% endfor %}
           </ul>
{% endblock %}
