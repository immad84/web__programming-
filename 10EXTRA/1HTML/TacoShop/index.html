     <meta charset="UTF-8" />

     <title>Little Taco Shop</title>
     <!-- <link rel="stylesheet" href="css/normalize.css" type="text/css"> -->
     <link rel="stylesheet" href="css/style.css" type="text/css" />

<body>
     <header id="header" class="header">
          <h1 class="header__h1 header__title">Little Taco Shop</h1>
          <nav class="header__nav">
               <ul class="header__ul">
                    <li class="header__li"><a href="#menu">Menu</a></li>
                    <li class="header__li"><a href="hours.html">Hours</a></li>
                    <li class="header__li"><a href="contact.html">Contact</a></li>
                    <li class="header__li"><a href="about.html">About</a></li>
               </ul>
          </nav>
     </header>

     <section id="hero" class="hero">
          <h2 class="hero__h2">Bienvenidos!</h2>
          <figure class="hero__figure">
               <img src="img/tacos_and_drink_1000x667.png" alt="Taco and Drink Image" title="Taco and a Drink"
                    width="1000" height="667" loading="lazy" />
               <figcaption class="offscreen">Taco and a Drink</figcaption>
          </figure>
     </section>

     <main id="main" class="main">
          <article id="menu" class="main__article menu">
               <h2 class="menu__h2">Our Menu</h2>
               <table class="menu__container">
                    <caption class="offscreen">Our Tacos</caption>
                    <thead>
                         <tr>
                              <th scope="col" class="menu__header">Tacos</th>
                              <th scope="col" class="menu__header"><abbr title="Quantity">Qty</abbr></th>
                              <th scope="col" class="menu__header">Price</th>
                         </tr>
                    </thead>
                    <tbody>
                         <tr>
                              <th scope="row"  rowspan="3" class="menu__item menu__cr">Crunchy</th>
                              <td class="menu__item">1</td>
                              <td class="menu__item">$1.50</td>
                         </tr>
                         <tr>
                              <td class="menu__item">2</td>
                              <td class="menu__item">$2.50</td>
                         </tr>
                         <tr>
                              <td class="menu__item">3</td>
                              <td class="menu__item">$3.25</td>
                         </tr>
                         <tr>
                              <th scope="row" rowspan="3" class="menu__item menu__sf">Soft</th>
                              <td class="menu__item">1</td>
                              <td class="menu__item">$2.00</td>
                         </tr>
                         <tr>
                              <td class="menu__item">2</td>
                              <td class="menu__item">$3.50</td>
                         </tr>
                         <tr>
                              <td class="menu__item">3</td>
                              <td class="menu__item">$4.25</td>
                         </tr>
                    </tbody>
                    <tfoot>
                         <tr>
                              <td colspan="3" class="menu__item menu__cs">Chips & Salsa $2</td>
                         </tr>
                    </tfoot>
               </table>
               <p class="center"><a href="#">Back to Top</a></p>
          </article>

     <footer id="footer" class="footer">
          <p class="footer__p">
               <span class="nowrap">Copyright &copy; <time id="year"></time></span>

          </p>
     </footer>
