<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>LTS Hours</title>
     <link rel="stylesheet" href="css/style.css">
     <script src="js/main.js" defer></script>
</head>

<body>
     <header id="header" class="hero">
          <h1 class="header__h1 header__title">Little Taco Shop</h1>
          <nav class="header__nav">
               <ul class="header__ul">
                    <li class="header__li"><a href="/">Home</a></li>
                    <li class="header__li"><a href="/#menu">Menu</a></li>
                    <li class="header__li"><a href="contact.html">Contact</a></li>
                    <li class="header__li"><a href="about.html">About</a></li>
               </ul>
          </nav>
     </header>

     <section id="hero" class="hero">
          <figure>
               <img src="img/tacos_tray_1000x667.png" alt="Taco Serving Image" width="1000" height="667"
                    title="Taco Plate Image" loading="lazy">
               <figcaption class="offscreen">A Tray of Tasty Tacos</figcaption>
          </figure>
     </section>

     <main id="main" class="main">
          <article class="main__article">
               <p>We are open 7 days a week!</p>
               <dl>
                    <dt>Sunday-Thursday</dt>
                    <dd>11am-9pm</dd>
                    <dt>Friday-Saturday</dt>
                    <dd>11am-11pm</dd>
               </dl>
               <p>
                    <a href="#">Back to Top</a>
               </p>
          </article>
     </main>

     <footer id="footer" class="footer">
          <p class="footer__p">
               <span class="nowrap">Copyright &copy; <time id="year"></time></span>
               <span class="nowrap">The Little Taco Shop</span>
          </p>
     </footer>

</body>

</html>
