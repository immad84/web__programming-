<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="css/style.css">
     <title>Typography Exercise</title>
</head>

<body>
     <header>
          <h1>CSS Typography</h1>
     </header>
     <main>
          <p>
               Lorem ipsum dolor sit amet consectetur adipisicing elit. Beatae non nostrum consequatur doloribus alias
               aliquam, dicta voluptas eligendi, qui accusamus voluptatibus ducimus id? Atque quidem corrupti
               temporibus, quam aliquid optio.
          </p>
          <form action="/">
               <p>
                    <label for="name">Name: </label>
                    <input type="text" name="name" id="name" placeholder="Type Your Name. " autocomplete="on">
               </p>
               <button type="submit">Submit</button>
          </form>
     </main>
</body>

</html>
