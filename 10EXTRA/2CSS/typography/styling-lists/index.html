<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Styling Lists</title>
     <link rel="stylesheet" href="css/style.css">
</head>

<body>

     <header>
          <h1>CSS Lists</h1>
     </header>

     <main>
          <article>
               <h2>Ordered List</h2>
               <ol start="5" reversed>
                    <li>Step 1</li>
                    <li>Step 2</li>
                    <li>Step 3</li>
                    <li>Step 4</li>
               </ol>
          </article>
          <article>
               <h2>Un-Ordered List</h2>
               <ul>
                    <li>Step 1</li>
                    <li>Step 2</li>
                    <li>Step 3</li>
                    <li>Step 4</li>
               </ul>
          </article>
     </main>

</body>

</html>
