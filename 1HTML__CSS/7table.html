<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Table</title>
     <style>
          table {
               border: 2px solid darkgreen;
               border-collapse: collapse;
          }
          th, td {
               border: 1px solid gray;
               padding: 1rem;
          }
     </style>
</head>
<body>
     <table>
          <thead>
               <tr>
                    <th>Sr. No</th>
                    <th>Product Name</th>
                    <th>Product Price</th>
               </tr>
          </thead>
          <tbody>
               <tr>
                    <td>1</td>
                    <td>ABC</td>
                    <td>$10</td>
               </tr>
               <tr>
                    <td>2</td>
                    <td>XYZ</td>
                    <td>$5</td>
               </tr>
          </tbody>
     </table>
</body>
</html>
