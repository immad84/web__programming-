<html lang="en">
	<head>

		<title>Form</title>
	</head>

	<body>
		<form action="">
			<div>
				<input type="text" name="name" placeholder="Full Nmae" />

			</div>
			<div>
				Favorite Color?
				<input type="radio" name="color" value="red" /> Red <input type="radio" name="color" value="green" /> Green <input type="radio" name="color" value="blue" /> Blue <input type="radio" name="other" value="other" /> Other
			</div>
			<div>
				<input type="" list="countries" placeholder="Countries">
                    <datalist id="countries">
                         <option value="Afghanisan"></option>
                         <option value="Pakistan"></option>
                         <option value="Sweden"></option>
                         <option value="United Kingdom"></option>

			</div>
		</form>

</html>
